name: Branch name

on:
  push:
    branches-ignore: [main]

jobs:
  check:
    name: Validate branch name
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          if ! echo "$BRANCH" | grep -qE '^[a-z][a-z0-9-]*$'; then
            echo ""
            echo "  Branch name rejected: '$BRANCH'"
            echo ""
            echo "  Branch names must be lowercase kebab-case with no slashes."
            echo "  For issue branches:     <issue-code>-<slug>   e.g. a1-supabase-setup"
            echo "  For non-issue branches: <slug>                e.g. organize-docs"
            echo ""
            exit 1
          fi
